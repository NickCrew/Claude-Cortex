title: Cortex Docs
description: User documentation for Cortex — context orchestration toolkit for Claude Code
url: "https://cortex.atlascrew.dev"
baseurl: ""

theme: just-the-docs

color_scheme: cortex

permalink: pretty
markdown: kramdown
kramdown:
  input: GFM

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/

heading_anchors: true

nav_sort: case_insensitive

back_to_top: true
back_to_top_text: "Back to top"

footer_content: >-
  Cortex &copy; 2025-2026. Distributed under the
  <a href="https://github.com/NickCrew/claude-cortex/blob/main/LICENSE">MIT License</a>.

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/NickCrew/claude-cortex"
gh_edit_source: site
gh_edit_view_mode: "edit"

aux_links:
  "GitHub":
    - "https://github.com/NickCrew/claude-cortex"

aux_links_new_tab: true

callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: yellow
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: red

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle

# Agent Trigger Configuration
# Defines when agents should be automatically suggested or activated

version: 1.0

triggers:
  # Code Quality Agents
  code-reviewer:
    keywords:
      - "review"
      - "check code"
      - "PR"
      - "pull request"
      - "code quality"
      - "refactor"
    file_patterns:
      - "**/*.{js,ts,jsx,tsx,py,go,rs,java}"
    events:
      - post-commit
      - pre-push
    auto: true
    priority: high

  # Security Agents
  security-auditor:
    keywords:
      - "security"
      - "vulnerability"
      - "auth"
      - "password"
      - "token"
      - "credential"
      - "SQL injection"
      - "XSS"
    file_patterns:
      - "**/auth/**"
      - "**/security/**"
      - "**/*auth*.{js,ts,py}"
      - "**/*security*.{js,ts,py}"
    events:
      - pre-deploy
    auto: true
    priority: critical

  # Testing Agents
  test-automator:
    keywords:
      - "test"
      - "coverage"
      - "unit test"
      - "integration test"
      - "e2e"
    file_patterns:
      - "**/*.test.{js,ts,py}"
      - "**/*.spec.{js,ts,py}"
      - "**/tests/**"
      - "**/__tests__/**"
    events:
      - pre-commit
    auto: true
    priority: medium

  # Debugging Agents
  debugger:
    keywords:
      - "debug"
      - "bug"
      - "error"
      - "stack trace"
      - "exception"
      - "crash"
      - "traceback"
    file_patterns:
      - "**/logs/**"
      - "**/*.log"
      - "**/crash/**"
    auto: true
    priority: medium

  # Database Agents
  database-optimizer:
    keywords:
      - "database"
      - "query"
      - "migration"
      - "schema"
      - "index"
      - "slow query"
    file_patterns:
      - "**/migrations/**"
      - "**/models/**"
      - "**/*model*.{js,ts,py}"
      - "**/*schema*.{js,ts,py}"
    auto: true
    priority: medium

  # Cloud & Infrastructure Agents
  cloud-architect:
    keywords:
      - "cloud architecture"
      - "cloud"
      - "aws"
      - "gcp"
      - "azure"
      - "migration"
      - "scalability"
      - "cost"
    file_patterns:
      - "**/*.tf"
      - "**/infra/**"
      - "**/infrastructure/**"
      - "**/cloud/**"
      - "**/k8s/**"
    auto: true
    priority: medium

  kubernetes-architect:
    keywords:
      - "kubernetes"
      - "k8s"
      - "helm"
      - "cluster"
      - "ingress"
      - "service mesh"
    file_patterns:
      - "**/k8s/**"
      - "**/helm/**"
      - "**/*.yaml"
      - "**/*.yml"
    auto: true
    priority: medium

  # Language-Specific Agents
  typescript-pro:
    keywords:
      - "typescript"
      - "type"
      - "interface"
      - "generic"
    file_patterns:
      - "**/*.ts"
      - "**/*.tsx"
    auto: true
    priority: low

  python-pro:
    keywords:
      - "python"
      - "django"
      - "flask"
      - "fastapi"
    file_patterns:
      - "**/*.py"
    auto: true
    priority: low

  tailwind-expert:
    keywords:
      - "tailwind"
      - "tailwindcss"
      - "utility classes"
      - "postcss"
    file_patterns:
      - "**/tailwind.config.*"
      - "**/postcss.config.*"
      - "**/*.css"
      - "**/*.scss"
    auto: false
    priority: medium

  # API & Integration Agents
  rest-expert:
    keywords:
      - "rest"
      - "restful"
      - "http api"
      - "endpoint"
      - "status code"
    file_patterns:
      - "**/routes/**"
      - "**/controllers/**"
      - "**/*openapi*.{yml,yaml,json}"
    auto: true
    priority: medium

  postgres-expert:
    keywords:
      - "postgres"
      - "postgresql"
      - "psql"
      - "sql"
      - "index"
    file_patterns:
      - "**/*.sql"
      - "**/migrations/**"
      - "**/schema.sql"
    auto: true
    priority: high

  # Testing Agents
  vitest-expert:
    keywords:
      - "vitest"
      - "vite test"
      - "unit test"
      - "testing"
    file_patterns:
      - "**/*.test.{ts,tsx,js,jsx}"
      - "**/*.spec.{ts,tsx,js,jsx}"
      - "vitest.config.*"
    auto: true
    priority: medium

# Trigger Rules
rules:
  # Auto-activation rules
  auto_activate:
    - when: "keywords_match >= 2"
      and: "auto == true"
      action: activate_agent

    - when: "file_pattern_match"
      and: "priority == critical"
      action: suggest_agent

  # Suggestion rules
  suggest:
    - when: "keywords_match == 1"
      action: suggest_agent

    - when: "file_pattern_match"
      and: "priority >= medium"
      action: suggest_agent

  # Priority-based activation
  priority_order:
    - critical
    - high
    - medium
    - low

# Agent Combinations
combinations:
  code_review_suite:
    agents:
      - code-reviewer
      - security-auditor
      - test-automator
    trigger_keywords:
      - "full review"
      - "comprehensive review"
      - "pr review"

  security_audit_suite:
    agents:
      - security-auditor
      - code-reviewer
    trigger_keywords:
      - "security audit"
      - "security review"

  performance_suite:
    agents:
      - database-optimizer
    trigger_keywords:
      - "performance audit"
      - "optimize performance"

# Event Configuration
events:
  pre-commit:
    enabled: true
    agents:
      - test-automator
      - code-reviewer

  post-commit:
    enabled: true
    agents:
      - code-reviewer

  pre-push:
    enabled: true
    agents:
      - code-reviewer
      - test-automator

  pre-deploy:
    enabled: true
    agents:
      - security-auditor

# Context-Aware Triggers
context:
  git_status:
    modified_files: track
    branch_name: check
    commit_message: analyze

  environment:
    development: relaxed_triggers
    staging: moderate_triggers
    production: strict_triggers

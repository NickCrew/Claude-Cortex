# Pre-commit hooks for contributors.
#
# Install once: `pip install pre-commit && pre-commit install`
# Run manually: `pre-commit run --all-files`
#
# The CI workflows at .github/workflows/skill-index.yml and
# .github/workflows/agent-index.yml enforce the same drift checks, so these
# hooks are optional but convenient.

repos:
  - repo: local
    hooks:
      - id: rebuild-skill-index
        name: Rebuild skill-index.json and fail on drift
        description: >-
          Regenerates skills/skill-index.json from SKILL.md front matter.
          Fails the commit if the index now differs from what was staged —
          re-stage skills/skill-index.json and commit again.
        entry: bash -c 'cortex skills rebuild-index && git diff --exit-code skills/skill-index.json'
        language: system
        files: '^skills/.*/SKILL\.md$'
        pass_filenames: false

      - id: rebuild-agent-index
        name: Rebuild agent-index.json and fail on drift
        description: >-
          Regenerates agents/agent-index.json from agent .md front matter.
          Fails the commit if the index now differs from what was staged —
          re-stage agents/agent-index.json and commit again.
        entry: bash -c 'cortex agent rebuild-index && git diff --exit-code agents/agent-index.json'
        language: system
        files: '^agents/[^/]+\.md$'
        pass_filenames: false

name: Skill Index

on:
  push:
    branches: [main]
    paths:
      - 'skills/**/SKILL.md'
      - 'skills/skill-index.json'
      - 'claude_ctx_py/skill_index.py'
      - 'claude_ctx_py/core/skills.py'
      - 'claude_ctx_py/cli.py'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**/SKILL.md'
      - 'skills/skill-index.json'
      - 'claude_ctx_py/skill_index.py'
      - 'claude_ctx_py/core/skills.py'
      - 'claude_ctx_py/cli.py'

jobs:
  drift-check:
    name: Fail if skill-index.json is stale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install cortex
        run: uv sync --dev

      - name: Rebuild skill-index.json
        run: uv run cortex skills rebuild-index
        env:
          CORTEX_ROOT: ${{ github.workspace }}

      - name: Fail on drift
        run: |
          if ! git diff --exit-code skills/skill-index.json; then
            echo ""
            echo "::error::skills/skill-index.json is out of sync with SKILL.md front matter."
            echo "::error::Run 'cortex skills rebuild-index' locally and commit the result."
            exit 1
          fi

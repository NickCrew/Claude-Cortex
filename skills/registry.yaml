# Unified Skills Registry
# Consolidates activation, versioning, composition, and metadata for all skills
#
# Schema: registry.schema.json
# Authors: authors.yaml
#
# This file is the single source of truth for skill discovery, activation, and dependencies.
# Legacy files (activation.yaml, versions.yaml, composition.yaml) remain for backward compatibility.

schema_version: "1.0.0"
last_updated: "2026-02-11"

# Category Definitions
categories:
  architecture:
    name: Architecture & Design
    description: System design, API patterns, and architectural decisions
    icon: "\U0001F3D7"  # building construction emoji
  development:
    name: Development
    description: Language-specific patterns and coding practices
    icon: "\U0001F4BB"  # laptop emoji
  infrastructure:
    name: Infrastructure
    description: Kubernetes, Terraform, and cloud infrastructure
    icon: "\U0001F527"  # wrench emoji
  security:
    name: Security
    description: Security practices, threat modeling, and vulnerability management
    icon: "\U0001F512"  # lock emoji
  devops:
    name: DevOps
    description: CI/CD, GitOps, and deployment workflows
    icon: "\U0001F680"  # rocket emoji
  testing:
    name: Testing
    description: Test patterns, TDD, and quality assurance
    icon: "\U0001F9EA"  # test tube emoji
  workflow:
    name: Workflow
    description: Development workflows and process patterns
    icon: "\U0001F504"  # sync emoji
  meta:
    name: Meta
    description: Skills about skills, tooling, and framework usage
    icon: "\U0001F4A1"  # light bulb emoji
  experimental:
    name: Experimental
    description: Experimental and community-contributed skills
    icon: "\U0001F52C"  # microscope emoji


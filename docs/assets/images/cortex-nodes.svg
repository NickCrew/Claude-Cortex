<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" fill="none">
  <!-- Cortex: Interconnected nodes - orchestration -->
  <!-- Central node -->
  <circle cx="55" cy="55" r="8" fill="none" stroke="#a478e8" stroke-width="2.5"/>
  <circle cx="55" cy="55" r="3" fill="#a478e8" opacity="0.5"/>
  <!-- Outer nodes -->
  <circle cx="28" cy="28" r="5" fill="none" stroke="#b98ef0" stroke-width="2" opacity="0.6"/>
  <circle cx="82" cy="28" r="5" fill="none" stroke="#b98ef0" stroke-width="2" opacity="0.6"/>
  <circle cx="28" cy="82" r="5" fill="none" stroke="#b98ef0" stroke-width="2" opacity="0.6"/>
  <circle cx="82" cy="82" r="5" fill="none" stroke="#b98ef0" stroke-width="2" opacity="0.6"/>
  <!-- Connection lines to center -->
  <line x1="35" y1="34" x2="48" y2="48" stroke="#a478e8" stroke-width="1.5" opacity="0.35"/>
  <line x1="75" y1="34" x2="62" y2="48" stroke="#a478e8" stroke-width="1.5" opacity="0.35"/>
  <line x1="35" y1="76" x2="48" y2="62" stroke="#a478e8" stroke-width="1.5" opacity="0.35"/>
  <line x1="75" y1="76" x2="62" y2="62" stroke="#a478e8" stroke-width="1.5" opacity="0.35"/>
  <!-- Cross connections -->
  <line x1="33" y1="28" x2="77" y2="28" stroke="#b98ef0" stroke-width="1" opacity="0.15"/>
  <line x1="28" y1="33" x2="28" y2="77" stroke="#b98ef0" stroke-width="1" opacity="0.15"/>
</svg>

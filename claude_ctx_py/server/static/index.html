<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cortex Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <span class="text-info">◆</span> Cortex
            </a>
            <span class="navbar-text ms-auto" id="connection-status">
                <span class="badge bg-success">Online</span>
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- Sidebar / Stats -->
            <div class="col-md-3">
                <div class="card mb-3">
                    <div class="card-header">Stats</div>
                    <div class="card-body">
                        <h5 class="card-title" id="agent-count">0 Agents</h5>
                        <p class="card-text text-muted">Available in system</p>
                    </div>
                </div>
                <div class="card mb-3">
                    <div class="card-header">Active Modes</div>
                    <div class="card-body">
                        <h5 class="card-title" id="mode-count">0 Modes</h5>
                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <ul class="nav nav-tabs mb-3" id="myTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="agents-tab" data-bs-toggle="tab" data-bs-target="#agents" type="button" role="tab">Agents</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="modes-tab" data-bs-toggle="tab" data-bs-target="#modes" type="button" role="tab">Modes</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="workflows-tab" data-bs-toggle="tab" data-bs-target="#workflows" type="button" role="tab">Workflows</button>
                    </li>
                </ul>
                <div class="tab-content" id="myTabContent">
                    <div class="tab-pane fade show active" id="agents" role="tabpanel">
                        <div class="row" id="agents-list">
                            <!-- Agents injected here -->
                        </div>
                    </div>
                    <div class="tab-pane fade" id="modes" role="tabpanel">
                        <div class="list-group" id="modes-list">
                            <!-- Modes injected here -->
                        </div>
                    </div>
                    <div class="tab-pane fade" id="workflows" role="tabpanel">
                        <div class="list-group" id="workflows-list">
                            <!-- Workflows injected here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Agent Details Modal -->
    <div class="modal fade" id="agentModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content bg-dark text-light border-secondary">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="agentModalLabel">Agent Details</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <pre><code id="agentModalContent" class="text-light"></code></pre>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
